<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>融合处理</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments :: topnav('fusion')}"></div>
<main class="page">
    <section class="page-head">
        <div><h1>融合处理</h1><p>选择导入批次，保存清洗规则并启动处理</p></div>
    </section>
    <div class="alert success" th:if="${message}" th:text="${message}"></div>

    <section class="content-grid two">
        <div class="panel">
            <div class="panel-head"><h2>启动清洗</h2></div>
            <form th:action="@{/fusion/run}" method="post" class="form-stack">
                <label>导入批次
                    <select name="batchId" required>
                        <option th:each="batch : ${batches}" th:value="${batch.id()}" th:text="${batch.label()}"></option>
                    </select>
                </label>
                <button class="btn primary" type="submit">启动清洗</button>
            </form>
        </div>
        <div class="panel">
            <div class="panel-head"><h2>规则配置</h2></div>
            <form th:action="@{/fusion/rules}" method="post" class="rule-list">
                <label><input type="checkbox" name="handleNulls" value="true" th:checked="${config.handleNulls()}"> 空值处理</label>
                <label><input type="checkbox" name="trimSpaces" value="true" th:checked="${config.trimSpaces()}"> 首尾空格清理</label>
                <label><input type="checkbox" name="removeDuplicates" value="true" th:checked="${config.removeDuplicates()}"> 整行去重</label>
                <label><input type="checkbox" name="normalizePhone" value="true" th:checked="${config.normalizePhone()}"> 手机号标准化</label>
                <label><input type="checkbox" name="normalizeEmail" value="true" th:checked="${config.normalizeEmail()}"> 邮箱标准化</label>
                <label><input type="checkbox" name="normalizeDate" value="true" th:checked="${config.normalizeDate()}"> 日期标准化</label>
                <button class="btn secondary" type="submit">保存规则</button>
            </form>
        </div>
    </section>

    <section class="panel">
        <div class="panel-head"><h2>处理结果记录</h2></div>
        <div class="table-wrap">
            <table>
                <thead><tr><th>记录</th><th>批次</th><th>类型</th><th>处理前</th><th>处理后</th><th>清洗数</th><th>异常数</th><th>状态</th><th>时间</th></tr></thead>
                <tbody>
                <tr th:each="record : ${records}">
                    <td th:text="${record.id()}"></td>
                    <td th:text="${record.batchId()}"></td>
                    <td th:text="${record.fusionType()}"></td>
                    <td th:text="${record.beforeCount()}"></td>
                    <td th:text="${record.afterCount()}"></td>
                    <td th:text="${record.cleanedCount()}"></td>
                    <td th:text="${record.errorCount()}"></td>
                    <td><span class="tag" th:text="${record.status()}"></span></td>
                    <td th:text="${record.createTime()}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
